<!DOCTYPE html>
<html>
<head>
    <title>Open DeshDarshan</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0f;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        h1 {
            color: #c9a227;
            margin-bottom: 20px;
        }
        a {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #c9a227, #e8c547);
            color: #0a0a0f;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.3s;
        }
        a:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DeshDarshan Travel Website</h1>
        <a href="index.html">Click to Open Website</a>
    </div>
</body>
</html>
